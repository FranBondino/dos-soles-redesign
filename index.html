<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dos Soles — Portal de Prototipos de Home</title>
  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Shared CSS Variables -->
  <link rel="stylesheet" href="shared/css/variables.css">
  <style>
    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-primary, 'Plus Jakarta Sans', sans-serif);
      background-color: #0b1a48; /* Premium Navy Blue */
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Top Portal Header */
    .portal-header {
      background-color: #0b1a48;
      border-bottom: 1px solid rgba(221, 153, 51, 0.2); /* Accent Gold border */
      padding: 1rem 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 10;
      flex-shrink: 0;
    }
    
    .header-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .logo-area {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .brand-logo {
      height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    
    .portal-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #dd9933; /* Gold */
      text-transform: uppercase;
      border-left: 1px solid rgba(255,255,255,0.2);
      padding-left: 1rem;
    }
    
    /* Controls Group */
    .controls-wrapper {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    
    .control-section {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 3px;
    }
    
    .control-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.6);
      margin-right: 0.5rem;
    }
    
    .btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.8);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .btn:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .btn.active {
      color: #0b1a48;
      background: #dd9933; /* Gold */
      box-shadow: 0 2px 10px rgba(221, 153, 51, 0.4);
    }
    
    .size-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    
    .size-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
    
    /* Concept Description Panel */
    .concept-bar {
      background-color: rgba(11, 26, 72, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0.75rem 2rem;
      font-size: 0.9rem;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 9;
      flex-shrink: 0;
    }
    
    .concept-badge {
      background-color: #D4000C; /* Red Primary */
      color: #ffffff;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    
    .concept-text {
      color: rgba(255, 255, 255, 0.9);
    }
    
    /* Preview Container Workspace */
    .preview-workspace {
      flex-grow: 1;
      background-color: #081233; /* Darker navy background for contrast */
      background-image: radial-gradient(rgba(221, 153, 51, 0.1) 1px, transparent 0);
      background-size: 24px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow: auto;
    }
    
    .iframe-container {
      width: 1280px; /* Default */
      height: 100%;
      min-height: 500px;
      max-height: 100%;
      background-color: #ffffff;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border: 2px solid #dd9933; /* Gold Accent border */
      border-radius: 8px;
      overflow: hidden;
      transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
    }
    
    .preview-iframe {
      width: 100%;
      height: 100%;
      border: none;
      flex-grow: 1;
    }
    
    /* Responsive details */
    @media (max-width: 1024px) {
      .header-main {
        flex-direction: column;
        align-items: flex-start;
      }
      .controls-wrapper {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>

  <!-- Top Portal Header -->
  <header class="portal-header">
    <div class="header-main">
      <div class="logo-area">
        <img src="https://dossolesdistribuidora.com.ar/wp-content/uploads/2024/12/LOGO-DOS-SOLES-180PX.png" alt="Dos Soles" class="brand-logo">
        <span class="portal-title">Portal de Prototipos</span>
      </div>
      
      <div class="controls-wrapper">
        <!-- Versions Switcher -->
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="control-label">Prototipo:</span>
          <div class="control-section">
            <button id="btn-v1" class="btn version-btn active" data-version="v1">V1 Editorial</button>
            <button id="btn-v2" class="btn version-btn" data-version="v2">V2 Dark & Gold</button>
            <button id="btn-v3" class="btn version-btn" data-version="v3">V3 Bento</button>
            <button id="btn-v4" class="btn version-btn" data-version="v4">V4 Sephora</button>
            <button id="btn-v5" class="btn version-btn" data-version="v5">V5 Douglas</button>
            <button id="btn-v6" class="btn version-btn" data-version="v6">V6 Bento Sephora</button>
          </div>
        </div>
        
        <!-- Size Switcher -->
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="control-label">Vista:</span>
          <div class="control-section">
            <button id="btn-desktop" class="btn size-btn active" data-size="desktop">
              <svg viewBox="0 0 24 24" width="14" height="14"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z" fill="currentColor"/></svg>
              Desktop
            </button>
            <button id="btn-tablet" class="btn size-btn" data-size="tablet">
              <svg viewBox="0 0 24 24" width="14" height="14"><path d="M18.5 0h-13C3.57 0 2 1.57 2 3.5v17C2 22.43 3.57 24 5.5 24h13c1.93 0 3.5-1.57 3.5-3.5v-17C22 1.57 20.43 0 18.5 0zm-6.5 22c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm7.5-4H4V3.5c0-.83.67-1.5 1.5-1.5h13c.83 0 1.5.67 1.5 1.5V18z" fill="currentColor"/></svg>
              Tablet
            </button>
            <button id="btn-mobile" class="btn size-btn" data-size="mobile">
              <svg viewBox="0 0 24 24" width="14" height="14"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z" fill="currentColor"/></svg>
              Mobile
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>
 
  <!-- Concept Bar -->
  <div class="concept-bar">
    <span class="concept-badge" id="concept-tag">V1 Editorial</span>
    <span class="concept-text" id="concept-desc">
      Estética ultra limpia, fondo blanco, bordes finos de 1px en gris muy claro. Enfoque editorial premium inspirado en el estilo de Juleriaque puro con sutiles acentos rojos.
    </span>
  </div>
 
  <!-- Workspace area containing the iframe -->
  <main class="preview-workspace">
    <div id="iframe-container" class="iframe-container">
      <iframe id="preview-iframe" class="preview-iframe" src="v1-editorial/index.html" title="Visualizador Prototipo Dos Soles"></iframe>
    </div>
  </main>
 
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const iframeContainer = document.getElementById('iframe-container');
      const iframe = document.getElementById('preview-iframe');
      
      const conceptTag = document.getElementById('concept-tag');
      const conceptDesc = document.getElementById('concept-desc');
      
      // Concepts metadata mapping
      const concepts = {
        v1: {
          tag: 'V1 Editorial',
          desc: 'Estética ultra limpia, fondo blanco, bordes finos de 1px en gris muy claro. Enfoque editorial premium inspirado en el estilo de Juleriaque puro con sutiles acentos rojos.',
          url: 'v1-editorial/index.html'
        },
        v2: {
          tag: 'V2 Dark & Gold',
          desc: 'Enfoque profesional y B2B orientado a salones de belleza y estilistas. Fondo azul marino profundo (#0b1a48) combinado con elegantes contrastes en oro y rojo, destacando cursos y marcas premium.',
          url: 'v2-darkgold/index.html'
        },
        v3: {
          tag: 'V3 Bento Grid',
          desc: 'Distribución contemporánea y dinámica estructurada a través de un Bento Grid. Presenta tarjetas de categorías interactivas con relieves, sombras sutiles y micro-animaciones fluidas en hover.',
          url: 'v3-bento/index.html'
        },
        v4: {
          tag: 'V4 Sephora',
          desc: 'Estética vibrante y moderna inspirada en Sephora. Fondo blanco, detalles en negro sólido y acentos en rojo vibrante (#D4000C). Incluye slider interactivo y zoom en hover.',
          url: 'v4-sephora/index.html'
        },
        v5: {
          tag: 'V5 Douglas',
          desc: 'Enfoque premium de alto contraste inspirado en Douglas. Fondo azul marino oscuro (#050a1d), detalles en dorado (#dd9933) y textos en blanco. Resalta rutinas profesionales con bordes dorados.',
          url: 'v5-douglas/index.html'
        },
        v6: {
          tag: 'V6 Bento Sephora',
          desc: 'Combina la versatilidad de la grilla Bento con la estética vibrante de Sephora. Bordes redondeados, fondos claros, acentos rojos y micro-animaciones dinámicas al pasar el mouse por las categorías.',
          url: 'v6-bento-sephora/index.html'
        }
      };
 
      // Version switcher handler
      const versionBtns = document.querySelectorAll('.version-btn');
      versionBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          versionBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const version = btn.getAttribute('data-version');
          const concept = concepts[version];
          
          if (concept) {
            iframe.src = concept.url;
            conceptTag.textContent = concept.tag;
            conceptTag.style.backgroundColor = (version === 'v1' || version === 'v4' || version === 'v6') ? '#D4000C' : ((version === 'v2' || version === 'v5') ? '#dd9933' : '#4c4d52');
            conceptDesc.textContent = concept.desc;
          }
        });
      });

      // Viewport size switcher handler
      const sizeBtns = document.querySelectorAll('.size-btn');
      sizeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          sizeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const size = btn.getAttribute('data-size');
          if (size === 'desktop') {
            iframeContainer.style.width = '1280px';
          } else if (size === 'tablet') {
            iframeContainer.style.width = '768px';
          } else if (size === 'mobile') {
            iframeContainer.style.width = '390px';
          }
        });
      });
    });
  </script>
</body>
</html>
